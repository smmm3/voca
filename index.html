<html lang="ko" data-hwp-extension="rhwp" data-hwp-extension-version="0.2.6"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>github.io/E</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeece8;
      --text: #1a1a18; --text2: #6b6b67; --text3: #a3a39f;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --green: #1D9E75; --green-dark: #0F6E56;
      --red: #E24B4A; --amber: #EF9F27; --blue: #378ADD;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
        --text: #f0ede8; --text2: #9a9994; --text3: #5c5c59;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1.5rem 0.75rem; }
    .container { max-width: 760px; margin: 0 auto; background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.5rem; }

    /* header */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
    .header-btns { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

    /* tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); }
    .tab { padding: 7px 14px; font-size: 13px; border: none; background: none; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; font-family: inherit; transition: color 0.15s; }
    .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }
    .tab:hover:not(.active) { color: var(--text); }

    /* day bar */
    .day-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
    .day-bar label { font-size: 13px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
    .day-scroll { display: flex; gap: 6px; overflow-x: scroll; padding-bottom: 6px; flex: 1; min-width: 0; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
    .day-scroll::-webkit-scrollbar { height: 4px; }
    .day-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .day-scroll::-webkit-scrollbar-track { background: transparent; }
    .day-btn { flex-shrink: 0; padding: 4px 11px; font-size: 12px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .day-btn:hover { background: var(--bg2); color: var(--text); }
    .day-btn.active { background: var(--green); color: #fff; border-color: var(--green); font-weight: 500; }
    .day-btn.has-words { border-color: var(--green); color: var(--green); }
    .day-btn.has-words.active { background: var(--green); color: #fff; }

    /* add form */
    .add-form { display: flex; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .add-form input, .add-form select { padding: 9px 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; font-family: inherit; }
    .add-form input { flex: 1; min-width: 90px; }
    .add-form select { min-width: 88px; cursor: pointer; }
    .add-form input:focus, .add-form select:focus { border-color: var(--green); }
    .add-form input::placeholder { color: var(--text3); }
    .btn { padding: 8px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit; transition: background 0.15s; }
    .btn:hover { background: var(--bg2); }
    .btn-green { background: var(--green); color: #fff; border-color: var(--green); }
    .btn-green:hover { background: var(--green-dark); border-color: var(--green-dark); }
    .hint { font-size: 12px; color: var(--text3); margin-bottom: 1.25rem; }

    /* search */
    .search-wrap { position: relative; margin-bottom: 1rem; }
    .search-wrap input { width: 100%; padding: 9px 13px 9px 36px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; background: var(--bg); color: var(--text); outline: none; }
    .search-wrap input:focus { border-color: var(--green); }
    .search-wrap input::placeholder { color: var(--text3); }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; font-size: 14px; }

    /* progress */
    .progress-bar { height: 4px; background: var(--bg2); border-radius: 2px; margin-bottom: 6px; }
    .progress-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width 0.3s; }
    .progress-text { font-size: 12px; color: var(--text2); margin-bottom: 1rem; }
    .toggle-link { font-size: 13px; color: var(--green); cursor: pointer; border: none; background: none; font-family: inherit; padding: 0; white-space: nowrap; }
    .toggle-link:hover { text-decoration: underline; }

    /* table - desktop */
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 12px; font-weight: 500; color: var(--text2); text-align: left; padding: 8px 10px; border-bottom: 0.5px solid var(--border); }
    td { padding: 10px; border-bottom: 0.5px solid var(--border); font-size: 13px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg2); }
    .word-en { font-weight: 500; font-size: 14px; }
    .day-badge { font-size: 10px; padding: 1px 7px; border-radius: 20px; background: var(--bg2); color: var(--text3); border: 0.5px solid var(--border); display: inline-block; margin-top: 3px; }
    .meaning { display: inline-block; cursor: pointer; user-select: none; border-radius: 4px; padding: 2px 8px; transition: background 0.15s; width: 100%; font-size: 13px; }
    .meaning.hidden { background: var(--bg2); color: transparent; border: 0.5px solid var(--border2); }
    .meaning.visible { color: var(--text); }
    .action-cell { display: flex; align-items: center; gap: 1px; }
    .icon-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 3px 4px; border-radius: 4px; line-height: 1; transition: color 0.15s, background 0.15s; color: var(--text3); }
    .icon-btn:hover { background: var(--bg2); }
    .bookmark-btn { color: var(--text3); font-size: 14px; }
    .bookmark-btn.bookmarked { color: var(--amber); }
    .bookmark-btn:hover { color: var(--amber); }
    .edit-btn:hover { color: var(--blue); }
    .del-btn:hover { color: var(--red); }
    tr.bookmarked-row td { background: rgba(239,159,39,0.06); }
    tr.bookmarked-row td:first-child { border-left: 3px solid var(--amber); padding-left: 7px; }
    tr.bookmarked-row:hover td { background: rgba(239,159,39,0.11); }
    tr.editing-row td { background: rgba(55,138,221,0.05); padding-top: 7px; padding-bottom: 7px; }
    tr.editing-row td:first-child { border-left: 3px solid var(--blue); padding-left: 7px; }
    .edit-inputs { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .edit-inputs input, .edit-inputs select { padding: 6px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; background: var(--bg); color: var(--text); outline: none; font-family: inherit; min-width: 70px; }
    .edit-inputs input { flex: 1; }
    .edit-inputs input:focus, .edit-inputs select:focus { border-color: var(--blue); }
    .edit-save { padding: 6px 12px; font-size: 12px; border-radius: var(--radius); border: none; background: var(--green); color: #fff; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .edit-save:hover { background: var(--green-dark); }
    .edit-cancel { padding: 6px 12px; font-size: 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; }
    .edit-cancel:hover { background: var(--bg2); }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
    .sec-add { display: none; }
    .sec-add.active { display: block; }

    /* 파일로 저장 버튼 */
    .btn-save { background: #5856D6; color: #fff; border-color: #5856D6; }
    .btn-save:hover { background: #3f3eb8; border-color: #3f3eb8; }

    /* 모바일 최적화 */
    @media (max-width: 540px) {
      body { padding: 0; }
      .container { border-radius: 0; border-left: none; border-right: none; padding: 1rem 0.875rem; min-height: 100vh; }
      .add-form { flex-direction: column; }
      .add-form select { width: 100%; }
      .header-btns .btn { font-size: 12px; padding: 6px 10px; }

      /* 모바일: 테이블 대신 카드형 */
      thead { display: none; }
      table, tbody, tr, td { display: block; width: 100%; }
      tr { border-bottom: 0.5px solid var(--border); padding: 10px 0; position: relative; }
      tr:last-child { border-bottom: none; }
      tr:hover td { background: transparent; }
      td { border-bottom: none; padding: 2px 0; font-size: 13px; }
      .word-en { font-size: 15px; font-weight: 600; padding-bottom: 4px; }
      .meaning { width: 100%; display: block; margin-top: 4px; text-align: center; padding: 6px 8px; }
      .meaning.hidden { width: 100%; }
      .action-cell { position: absolute; top: 10px; right: 0; gap: 2px; }
      tr.bookmarked-row { border-left: 3px solid var(--amber); padding-left: 8px; }
      tr.bookmarked-row td:first-child { border-left: none; padding-left: 0; }
      tr.editing-row { border-left: 3px solid var(--blue); padding-left: 8px; }
      tr.editing-row td:first-child { border-left: none; padding-left: 0; }
      .edit-inputs { flex-direction: column; }
      .edit-inputs input, .edit-inputs select { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <button class="toggle-link" id="toggle-all-btn">뜻 모두 보기</button>
    <div class="header-btns">
      <button class="btn btn-save" id="save-file-btn">💾 파일로 저장</button>
     
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="all">전체 단어</button>
    <button class="tab" data-tab="bookmarks">⭐ 북마크</button>
  </div>

  <div class="day-bar">
    <label>Day</label>
    <div class="day-scroll" id="day-scroll"><button class="day-btn active">전체</button><button class="day-btn has-words">Day 1</button><button class="day-btn">Day 2</button><button class="day-btn">Day 3</button><button class="day-btn">Day 4</button><button class="day-btn">Day 5</button><button class="day-btn">Day 6</button><button class="day-btn">Day 7</button><button class="day-btn">Day 8</button><button class="day-btn">Day 9</button><button class="day-btn">Day 10</button><button class="day-btn">Day 11</button><button class="day-btn">Day 12</button><button class="day-btn">Day 13</button><button class="day-btn">Day 14</button><button class="day-btn">Day 15</button><button class="day-btn">Day 16</button><button class="day-btn">Day 17</button><button class="day-btn">Day 18</button><button class="day-btn">Day 19</button><button class="day-btn">Day 20</button><button class="day-btn">Day 21</button><button class="day-btn">Day 22</button><button class="day-btn">Day 23</button><button class="day-btn">Day 24</button><button class="day-btn">Day 25</button><button class="day-btn">Day 26</button><button class="day-btn">Day 27</button><button class="day-btn">Day 28</button><button class="day-btn">Day 29</button><button class="day-btn">Day 30</button><button class="day-btn">Day 31</button><button class="day-btn">Day 32</button><button class="day-btn">Day 33</button><button class="day-btn">Day 34</button><button class="day-btn">Day 35</button><button class="day-btn">Day 36</button><button class="day-btn">Day 37</button><button class="day-btn">Day 38</button><button class="day-btn">Day 39</button><button class="day-btn">Day 40</button><button class="day-btn">Day 41</button><button class="day-btn">Day 42</button><button class="day-btn">Day 43</button><button class="day-btn">Day 44</button><button class="day-btn">Day 45</button><button class="day-btn">Day 46</button><button class="day-btn">Day 47</button><button class="day-btn">Day 48</button><button class="day-btn">Day 49</button><button class="day-btn">Day 50</button></div>
  </div>

  <div class="sec-add active" id="sec-add">
    <div class="add-form">
      <input type="text" id="inp-en" placeholder="영어 단어" autocomplete="off">
      <input type="text" id="inp-ko" placeholder="뜻" autocomplete="off">
      <select id="inp-day"><option value="1">Day 1</option><option value="2">Day 2</option><option value="3">Day 3</option><option value="4">Day 4</option><option value="5">Day 5</option><option value="6">Day 6</option><option value="7">Day 7</option><option value="8">Day 8</option><option value="9">Day 9</option><option value="10">Day 10</option><option value="11">Day 11</option><option value="12">Day 12</option><option value="13">Day 13</option><option value="14">Day 14</option><option value="15">Day 15</option><option value="16">Day 16</option><option value="17">Day 17</option><option value="18">Day 18</option><option value="19">Day 19</option><option value="20">Day 20</option><option value="21">Day 21</option><option value="22">Day 22</option><option value="23">Day 23</option><option value="24">Day 24</option><option value="25">Day 25</option><option value="26">Day 26</option><option value="27">Day 27</option><option value="28">Day 28</option><option value="29">Day 29</option><option value="30">Day 30</option><option value="31">Day 31</option><option value="32">Day 32</option><option value="33">Day 33</option><option value="34">Day 34</option><option value="35">Day 35</option><option value="36">Day 36</option><option value="37">Day 37</option><option value="38">Day 38</option><option value="39">Day 39</option><option value="40">Day 40</option><option value="41">Day 41</option><option value="42">Day 42</option><option value="43">Day 43</option><option value="44">Day 44</option><option value="45">Day 45</option><option value="46">Day 46</option><option value="47">Day 47</option><option value="48">Day 48</option><option value="49">Day 49</option><option value="50">Day 50</option></select>
      <button class="btn btn-green" id="add-btn">+ 추가</button>
    </div>
    <p class="hint">Enter 키로도 추가할 수 있어요.</p>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="단어 검색..." autocomplete="off">
  </div>

  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width: 0%;"></div></div>
  <div class="progress-text" id="prog-text">확인한 단어: 0 / 3</div>

  <table>
    <thead>
      <tr>
        <th>영어 단어</th>
        <th>뜻 (클릭해서 보기/가리기)</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="word-body"><tr><td class="word-en">respect<br><span class="day-badge">Day 1</span></td><td><span class="meaning hidden" data-idx="0">[동] 존경하다 [명] ① 존경 ② (측)면</span></td><td><div class="action-cell"><button class="icon-btn bookmark-btn " data-idx="0" title="북마크 추가">⭐</button><button class="icon-btn edit-btn" data-idx="0" title="편집">✏️</button><button class="icon-btn del-btn" data-idx="0" title="삭제">✕</button></div></td></tr><tr><td class="word-en">indicate<br><span class="day-badge">Day 1</span></td><td><span class="meaning hidden" data-idx="1">[동] ① 나타내다, 암시하다 ② 지시하다, 가리키다</span></td><td><div class="action-cell"><button class="icon-btn bookmark-btn " data-idx="1" title="북마크 추가">⭐</button><button class="icon-btn edit-btn" data-idx="1" title="편집">✏️</button><button class="icon-btn del-btn" data-idx="1" title="삭제">✕</button></div></td></tr><tr><td class="word-en">improvise<br><span class="day-badge">Day 1</span></td><td><span class="meaning hidden" data-idx="2">[동] 즉흥적으로 하다</span></td><td><div class="action-cell"><button class="icon-btn bookmark-btn " data-idx="2" title="북마크 추가">⭐</button><button class="icon-btn edit-btn" data-idx="2" title="편집">✏️</button><button class="icon-btn del-btn" data-idx="2" title="삭제">✕</button></div></td></tr></tbody>
  </table>
  <div class="empty" id="empty-msg" style="display: none;"></div>
</div>

<script>
  const TOTAL_DAYS = 50;
  let words = JSON.parse(localStorage.getItem("vocab_words") || '[{"en":"respect","ko":"[동] 존경하다 [명] ① 존경 ② (측)면","day":1},{"en":"indicate","ko":"[동] ① 나타내다, 암시하다 ② 지시하다, 가리키다","day":1},{"en":"improvise","ko":"[동] 즉흥적으로 하다","day":1}]');
  let bookmarks = new Set(JSON.parse(localStorage.getItem("vocab_bookmarks") || '[]'));
  let revealed = new Set();
  let allVisible = false;
  let currentTab = "all";
  let currentDay = 0;
  let editingIdx = -1;

  const inpDay = document.getElementById("inp-day");
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const opt = document.createElement("option");
    opt.value = d; opt.textContent = "Day " + d;
    inpDay.appendChild(opt);
  }

  function buildDayBar() {
    const scroll = document.getElementById("day-scroll");
    scroll.innerHTML = "";
    const allBtn = document.createElement("button");
    allBtn.className = "day-btn" + (currentDay === 0 ? " active" : "");
    allBtn.textContent = "전체";
    allBtn.addEventListener("click", () => { currentDay = 0; editingIdx = -1; revealed = new Set(); render(); buildDayBar(); });
    scroll.appendChild(allBtn);
    for (let d = 1; d <= TOTAL_DAYS; d++) {
      const hasWords = words.some(w => w.day === d);
      const btn = document.createElement("button");
      btn.className = "day-btn" + (hasWords ? " has-words" : "") + (currentDay === d ? " active" : "");
      btn.textContent = "Day " + d;
      const day = d;
      btn.addEventListener("click", () => { currentDay = day; editingIdx = -1; revealed = new Set(); render(); buildDayBar(); });
      scroll.appendChild(btn);
    }
  }

  function save() {
    localStorage.setItem("vocab_words", JSON.stringify(words));
    localStorage.setItem("vocab_bookmarks", JSON.stringify([...bookmarks]));
  }

  function getFiltered() {
    const q = document.getElementById("search-input").value.trim().toLowerCase();
    return words.reduce((acc, w, i) => {
      const matchQ = !q || w.en.toLowerCase().includes(q) || w.ko.includes(q);
      const matchTab = currentTab === "all" || bookmarks.has(i);
      const matchDay = currentDay === 0 || w.day === currentDay;
      if (matchQ && matchTab && matchDay) acc.push({ w, i });
      return acc;
    }, []);
  }

  function updateProgress() {
    const filtered = getFiltered();
    const total = filtered.length;
    const done = filtered.filter(({ i }) => allVisible || revealed.has(i)).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById("prog-fill").style.width = pct + "%";
    document.getElementById("prog-text").textContent = total ? "확인한 단어: " + done + " / " + total : "";
  }

  function makeEditSelect(selectedDay) {
    let sel = '<select class="edit-day-sel">';
    for (let d = 1; d <= TOTAL_DAYS; d++) {
      sel += '<option value="' + d + '"' + (d === selectedDay ? ' selected' : '') + '>Day ' + d + '</option>';
    }
    sel += '</select>';
    return sel;
  }

  function render() {
    const filtered = getFiltered();
    const tbody = document.getElementById("word-body");
    const emptyMsg = document.getElementById("empty-msg");
    tbody.innerHTML = "";

    if (filtered.length === 0) {
      emptyMsg.style.display = "";
      if (currentTab === "bookmarks") emptyMsg.textContent = "북마크한 단어가 없어요. ⭐ 버튼으로 추가해 보세요!";
      else if (words.length === 0) emptyMsg.textContent = "아직 단어가 없어요. 위에서 추가해 보세요!";
      else if (currentDay > 0) emptyMsg.textContent = "Day " + currentDay + "에 단어가 없어요.";
      else emptyMsg.textContent = "검색 결과가 없어요.";
    } else {
      emptyMsg.style.display = "none";
    }

    const sorted = [...filtered].sort((a, b) => (a.w.day || 1) - (b.w.day || 1));

    sorted.forEach(({ w, i }) => {
      const vis = allVisible || revealed.has(i);
      const isBookmarked = bookmarks.has(i);
      const isEditing = editingIdx === i;
      const tr = document.createElement("tr");

      if (isEditing) {
        tr.classList.add("editing-row");
        tr.innerHTML =
          '<td colspan="2"><div class="edit-inputs">' +
            '<input class="edit-en" value="' + esc(w.en) + '" placeholder="영어 단어" />' +
            '<input class="edit-ko" value="' + esc(w.ko) + '" placeholder="뜻" />' +
            makeEditSelect(w.day || 1) +
          '</div></td>' +
          '<td><div class="action-cell">' +
            '<button class="edit-save">저장</button>' +
            '<button class="edit-cancel">취소</button>' +
          '</div></td>';

        tr.querySelector(".edit-save").addEventListener("click", () => {
          const newEn = tr.querySelector(".edit-en").value.trim();
          const newKo = tr.querySelector(".edit-ko").value.trim();
          const newDay = parseInt(tr.querySelector(".edit-day-sel").value);
          if (!newEn || !newKo) return;
          words[i] = { en: newEn, ko: newKo, day: newDay };
          editingIdx = -1;
          save(); buildDayBar(); render();
        });
        tr.querySelector(".edit-cancel").addEventListener("click", () => { editingIdx = -1; render(); });
        ["edit-en", "edit-ko"].forEach(cls => {
          tr.querySelector("." + cls).addEventListener("keydown", e => {
            if (e.key === "Enter") tr.querySelector(".edit-save").click();
            if (e.key === "Escape") { editingIdx = -1; render(); }
          });
        });
      } else {
        if (isBookmarked) tr.classList.add("bookmarked-row");
        tr.innerHTML =
          '<td class="word-en">' + esc(w.en) +
            (currentDay === 0 ? '<br><span class="day-badge">Day ' + (w.day || 1) + '</span>' : '') +
          '</td>' +
          '<td><span class="meaning ' + (vis ? "visible" : "hidden") + '" data-idx="' + i + '">' + esc(w.ko) + '</span></td>' +
          '<td><div class="action-cell">' +
            '<button class="icon-btn bookmark-btn ' + (isBookmarked ? "bookmarked" : "") + '" data-idx="' + i + '" title="' + (isBookmarked ? "북마크 해제" : "북마크 추가") + '">⭐</button>' +
            '<button class="icon-btn edit-btn" data-idx="' + i + '" title="편집">✏️</button>' +
            '<button class="icon-btn del-btn" data-idx="' + i + '" title="삭제">✕</button>' +
          '</div></td>';

        tr.querySelector(".meaning").addEventListener("click", function () {
          const idx = parseInt(this.dataset.idx);
          if (allVisible) return;
          if (revealed.has(idx)) { revealed.delete(idx); this.className = "meaning hidden"; }
          else { revealed.add(idx); this.className = "meaning visible"; }
          updateProgress();
        });
        tr.querySelector(".bookmark-btn").addEventListener("click", function () {
          const idx = parseInt(this.dataset.idx);
          const row = this.closest("tr");
          if (bookmarks.has(idx)) {
            bookmarks.delete(idx); this.classList.remove("bookmarked");
            this.title = "북마크 추가"; row.classList.remove("bookmarked-row");
          } else {
            bookmarks.add(idx); this.classList.add("bookmarked");
            this.title = "북마크 해제"; row.classList.add("bookmarked-row");
          }
          save();
          if (currentTab === "bookmarks") render();
        });
        tr.querySelector(".edit-btn").addEventListener("click", function () {
          editingIdx = parseInt(this.dataset.idx);
          render();
          setTimeout(() => { const el = document.querySelector(".edit-en"); if (el) el.focus(); }, 0);
        });
        tr.querySelector(".del-btn").addEventListener("click", function () {
          const idx = parseInt(this.dataset.idx);
          words.splice(idx, 1);
          bookmarks = new Set([...bookmarks].filter(r => r !== idx).map(r => r > idx ? r - 1 : r));
          revealed = new Set([...revealed].filter(r => r !== idx).map(r => r > idx ? r - 1 : r));
          if (editingIdx === idx) editingIdx = -1;
          save(); buildDayBar(); render();
        });
      }
      tbody.appendChild(tr);
    });
    updateProgress();
  }

  function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  function addWord() {
    const en = document.getElementById("inp-en").value.trim();
    const ko = document.getElementById("inp-ko").value.trim();
    const day = parseInt(document.getElementById("inp-day").value);
    if (!en || !ko) return;
    words.push({ en, ko, day });
    save();
    document.getElementById("inp-en").value = "";
    document.getElementById("inp-ko").value = "";
    document.getElementById("inp-en").focus();
    buildDayBar(); render();
  }

  // 💾 파일로 저장 — 단어가 내장된 HTML 다운로드
  document.getElementById("save-file-btn").addEventListener("click", () => {
    const wordData = JSON.stringify(words);
    const bmData = JSON.stringify([...bookmarks]);
    const currentHtml = document.documentElement.outerHTML;
    // 스크립트 내 초기값 교체
    const updated = currentHtml
      .replace(
        /let words = JSON\.parse\(localStorage\.getItem\("vocab_words"\) \|\| "\[\]"\);/,
        'let words = JSON.parse(localStorage.getItem("vocab_words") || \'' + wordData.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\');'
      )
      .replace(
        /let bookmarks = new Set\(JSON\.parse\(localStorage\.getItem\("vocab_bookmarks"\) \|\| "\[\]"\)\);/,
        'let bookmarks = new Set(JSON.parse(localStorage.getItem("vocab_bookmarks") || \'' + bmData.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\'));'
      );
    const blob = new Blob([updated], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "index.html";
    a.click();
  });

 

  document.getElementById("add-btn").addEventListener("click", addWord);
  ["inp-en","inp-ko"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") addWord(); });
  });
  document.getElementById("search-input").addEventListener("input", render);
  document.getElementById("toggle-all-btn").addEventListener("click", function () {
    allVisible = !allVisible;
    this.textContent = allVisible ? "뜻 모두 가리기" : "뜻 모두 보기";
    render();
  });
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", function () {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      this.classList.add("active");
      currentTab = this.dataset.tab;
      document.getElementById("sec-add").classList.toggle("active", currentTab === "all");
      editingIdx = -1; render();
    });
  });

  buildDayBar();
  render();
</script>
